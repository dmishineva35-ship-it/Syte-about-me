<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма обратной связи - Дарья Мишинёва</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        header, footer { background: #4a90e2; color: white; padding: 1rem; text-align: center; }
        nav ul { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 1rem; max-width: 300px; margin: 2rem auto; }
        nav a { display: block; padding: 1rem; background: #357abd; color: white; text-decoration: none; border-radius: 8px; text-align: center; }
        nav a:hover { background: #2c6598; }
        main { padding: 2rem; max-width: 800px; margin: 0 auto; }
        img { max-width: 200px; height: auto; border-radius: 50%; display: block; margin: 0 auto 2rem; }
        h1 { text-align: center; }
        form { max-width: 500px; margin: 2rem 0; background: #f8f9fa; padding: 2rem; border-radius: 12px; }
        input, textarea { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 120px; }
        button { background: #4a90e2; color: white; padding: 1rem 2rem; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; width: 100%; }
        button:hover { background: #357abd; }
    </style>
</head>
<body>
    <header>
        <h1>Напишите мне</h1>
    </header>
    <main>
        <img src="https://images.unsplash.com/photo-1494790108755-2616b612b786?w=200" alt="Дарья Мишинёва">
        <nav>
            <ul>
                <li><a href="index.html">🏠 Главная</a></li>

        </nav>
        <section style="margin-left: 350px; padding: 2rem;">
            <form action="#" method="post">
                <input type="text" placeholder="Ваше имя" required>
                <input type="email" placeholder="Ваш email" required>
                <textarea placeholder="Расскажите, что вас интересует? 😊" required></textarea>
                <button type="submit">Отправить сообщение</button>
            </form>
            <p style="font-size: 0.9rem; color: #666;">
    
            </p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Дарья Мишинёва, Воронеж</p>
    </footer>
</body>
</html>
